name: biblenotify
description:  Offline, privacy-friendly daily Bible verse notification app for Android 
publish_to: 'none'
version: 5.0.0+24

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Meta
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0

  # Architecture
  stacked: ^3.4.0
  stacked_services: ^1.1.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Settings
  shared_preferences: ^2.5.4

  # Time
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

  # Webview
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.9.1

dev_dependencies:
  build_runner: ^2.4.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.1
  stacked_generator: ^1.3.3
  golden_toolkit: ^0.15.0

flutter:
  generate: true
  uses-material-design: true

  assets:
